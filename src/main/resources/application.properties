spring.application.name=Farm quest

spring.docker.compose.enabled=false
server.servlet.session.persistent=false
server.tomcat.basedir=.tomcat

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.url=${REDIS_URL}
spring.data.redis.client-name=farm-quest

farm-quest.qdrant.enabled=${QDRANT_ENABLED:true}
farm-quest.qdrant.url=${QDRANT_URL}
farm-quest.qdrant.api-key=${QDRANT_API_KEY:}
farm-quest.qdrant.collection-name=${QDRANT_COLLECTION_NAME}
farm-quest.qdrant.vector-size=${QDRANT_VECTOR_SIZE}
farm-quest.qdrant.distance=${QDRANT_DISTANCE:COSINE}
