spring.application.name=Farm quest

spring.docker.compose.enabled=false
server.servlet.session.persistent=false
server.tomcat.basedir=.tomcat

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.redis.url=${REDIS_URL}
spring.data.redis.client-name=farm-quest

farm-quest.qdrant.enabled=${QDRANT_ENABLED:true}
farm-quest.qdrant.url=${QDRANT_URL}
farm-quest.qdrant.api-key=${QDRANT_API_KEY:}
farm-quest.qdrant.collection-name=${QDRANT_COLLECTION_NAME}
farm-quest.qdrant.vector-size=${QDRANT_VECTOR_SIZE}
farm-quest.qdrant.distance=${QDRANT_DISTANCE:COSINE}

spring.ai.model.chat=openai
spring.ai.openai.base-url=${PROXY_BASE_URL}
spring.ai.openai.api-key=${PROXY_API_KEY}
spring.ai.openai.chat.model=${SPRING_AI_CHAT_MODEL}
spring.ai.openai.chat.temperature=${SPRING_AI_CHAT_TEMPERATURE:0.4}

spring.ai.model.embedding.text=openai
spring.ai.openai.embedding.base-url=${EMBEDDING_BASE_URL}
spring.ai.openai.embedding.api-key=${EMBEDDING_API_KEY}
spring.ai.openai.embedding.model=${SPRING_AI_EMBEDDING_MODEL}

spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_GRPC_PORT:6334}
spring.ai.vectorstore.qdrant.api-key=${QDRANT_API_KEY:}
spring.ai.vectorstore.qdrant.collection-name=${QDRANT_COLLECTION_NAME}
spring.ai.vectorstore.qdrant.use-tls=${QDRANT_USE_TLS:false}
spring.ai.vectorstore.qdrant.initialize-schema=false

farm-quest.auth.game-code=farm-quest-mvp
farm-quest.auth.otp-expiry-minutes=10
farm-quest.auth.session-hours=24
farm-quest.auth.otp-resend-cooldown-seconds=2
farm-quest.auth.otp-max-requests-per-hour=3
farm-quest.auth.otp-max-attempts=5
farm-quest.auth.session-secret=${VISITOR_SESSION_SECRET:change-me-session-secret}
farm-quest.auth.email-verification-secret=${EMAIL_VERIFICATION_SECRET:change-me-email-secret}
farm-quest.auth.mail-mode=log
farm-quest.auth.mail-from=${MAIL_FROM:no-reply@example.com}
