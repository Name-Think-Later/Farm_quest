spring.application.name=Farm quest
spring.docker.compose.enabled=${SPRING_DOCKER_COMPOSE_ENABLED:false}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3s

app.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/farm_quest}
app.datasource.username=${DB_USERNAME:postgres}
app.datasource.password=${DB_PASSWORD:postgres}

app.qdrant.url=${QDRANT_URL:http://localhost:6333}
app.qdrant.collection-name=${QDRANT_COLLECTION_NAME:knowledge-documents}
app.qdrant.vector-size=${QDRANT_VECTOR_SIZE:1536}
app.qdrant.initialize-on-startup=${QDRANT_INITIALIZE_ON_STARTUP:true}

app.ai.provider.name=${AI_PROVIDER_NAME:spring-ai}
app.ai.provider.api-key=${AI_PROVIDER_API_KEY:}
