spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration, org.springframework.boot.flyway.autoconfigure.FlywayEndpointAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration
spring.application.name=Farm quest
spring.main.lazy-initialization=true
farm-quest.persistence.repositories.enabled=false
farm-quest.redis.repositories.enabled=false
farm-quest.redis.bootstrap.enabled=false

farm-quest.qdrant.enabled=false
farm-quest.qdrant.url=http://localhost:6333
farm-quest.qdrant.api-key=
farm-quest.qdrant.collection-name=test-collection
farm-quest.qdrant.vector-size=768
farm-quest.qdrant.distance=COSINE

spring.ai.chat.provider=openai
spring.ai.embedding.provider=openai
spring.ai.model.chat=openai
spring.ai.model.embedding.text=openai
spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=http://localhost:8081
spring.ai.openai.embedding.api-key=test-key
spring.ai.openai.embedding.base-url=http://localhost:8081
