services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farm-quest-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/farm_quest
      DATABASE_USERNAME: "${DATABASE_USERNAME:-farm_quest}"
      DATABASE_PASSWORD: "${DATABASE_PASSWORD:-farm_quest}"
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION_NAME: "${QDRANT_COLLECTION_NAME:-knowledge-documents}"
      QDRANT_VECTOR_SIZE: "${QDRANT_VECTOR_SIZE:-1536}"
      FARM_QUEST_ADMIN_AUTH_SECRET: "${FARM_QUEST_ADMIN_AUTH_SECRET:-change-me-admin-secret}"
      PROXY_BASE_URL: "${PROXY_BASE_URL:-https://api.openai.com}"
      PROXY_API_KEY: "${PROXY_API_KEY:-change-me-openai-api-key}"
      SPRING_AI_CHAT_MODEL: "${SPRING_AI_CHAT_MODEL:-gpt-4o-mini}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-https://api.openai.com}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-change-me-openai-api-key}"
      SPRING_AI_EMBEDDING_MODEL: "${SPRING_AI_EMBEDDING_MODEL:-text-embedding-3-small}"
      MAIL_MODE: "${MAIL_MODE:-log}"
      MAIL_FROM: "${MAIL_FROM:-no-reply@example.com}"
      MAIL_SUBJECT: "${MAIL_SUBJECT:-Farm Quest 驗證碼}"
      MAIL_HOST: "${MAIL_HOST:-}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      MAIL_AUTH: "${MAIL_AUTH:-true}"
      MAIL_STARTTLS_ENABLED: "${MAIL_STARTTLS_ENABLED:-true}"
      MAIL_SSL_ENABLED: "${MAIL_SSL_ENABLED:-false}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PUBLIC_API_BASE_URL: "${VITE_PUBLIC_API_BASE_URL:-http://localhost:8080}"
        VITE_USE_MOCK_API: "${VITE_USE_MOCK_API:-true}"
    container_name: farm-quest-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: farm-quest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: farm_quest
      POSTGRES_USER: "${DATABASE_USERNAME:-farm_quest}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:-farm_quest}"
      TZ: UTC
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-farm_quest} -d farm_quest" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farm-quest-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: farm-quest-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333'" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
