services:
  postgres:
    image: postgres:16
    container_name: farm-quest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: farm_quest
      POSTGRES_USER: "${DATABASE_USERNAME:-farm_quest}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD:-farm_quest}"
      TZ: UTC
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-farm_quest} -d farm_quest" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: farm-quest-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: farm-quest-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:6333/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
